[project]
name = "gpu_core_v2"
version = "1.0.0"

[target]
fpga = "generic"
clock_hz = 100_000_000

[interface]
name = "axi4-lite"
address_width = 16
data_width = 32

[memory]
# Only Vector buffers (BRAM) - staying internal
"0x40000010" = { size = 32, type = "bram", element_bits = 16 }
"0x40000020" = { size = 32, type = "bram", element_bits = 16 }
"0x40000030" = { size = 32, type = "bram", element_bits = 16 }

[io]
# These are the actual physical pins for the chip
"0x40000000" = { pin = "A1", direction = "input" }   # cpu_control
"0x40000004" = { pin = "A2", direction = "output" }  # status
"0x40000008" = { pin = "A3", direction = "input" }   # cpu_opcode
"0x40000040" = { pin = "A4", direction = "input" }   # cpu_write_data
"0x40000044" = { pin = "A5", direction = "input" }   # cpu_write_addr
"0x40000048" = { pin = "A6", direction = "input" }   # cpu_write_en
"0x4000004C" = { pin = "A7", direction = "input" }   # cpu_read_en
"0x40000050" = { pin = "A8", direction = "output" }  # read_data
